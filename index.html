<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gesture-driven 3D particle system</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }
    #canvas { width:100vw; height:100vh; display:block; }
    #video { position:fixed; right:10px; bottom:10px; width:160px; height:auto; opacity:0.15; border-radius:8px; }
  </style>
</head>
<body>

  <!-- Three.j  <canvas id="canvas"></canvas>
  <video id="video" playsinline></video>
s -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/draw_utils/draw_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="module">
    // ============ Core: Scene, renderer, camera ============
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);

    const clock = new THREE.Clock();

    // ============ Particle system (GPU points) ============
    const COUNT = 20000; // Adjust for performance (~10–50k on desktop GPUs).
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const basePositions = new Float32Array(COUNT * 3);  // initial random
    const targetPositions = new Float32Array(COUNT * 3); // morph target
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);

    // Fill buffers
    for (let i = 0; i < COUNT; i++) {
      const ix = i * 3;
      const r = Math.random() * 2 - 1;
      const g = Math.random() * 2 - 1;
      const b = Math.random() * 2 - 1;
      positions[ix + 0] = (Math.random() - 0.5) * 4.0;
      positions[ix + 1] = (Math.random() - 0.5) * 4.0;
      positions[ix + 2] = (Math.random() - 0.5) * 4.0;
      basePositions[ix + 0] = positions[ix + 0];
      basePositions[ix + 1] = positions[ix + 1];
      basePositions[ix + 2] = positions[ix + 2];
      targetPositions[ix + 0] = positions[ix + 0];
      targetPositions[ix + 1] = positions[ix + 1];
      targetPositions[ix + 2] = positions[ix + 2];
      colors[ix + 0] = 0.9;
      colors[ix + 1] = 0.9;
      colors[ix + 2] = 1.0;
      sizes[i] = 2.0 + Math.random() * 1.5;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geometry.computeBoundingSphere();

    // Shaders
    const vertex = /* glsl */`
      attribute vec3 aColor;
      attribute float aSize;
      varying vec3 vColor;

      uniform float uTime;
      uniform float uScale;      // global expansion
      uniform float uMorph;      // 0..1 morph factor
      uniform float uNoiseAmp;   // subtle motion

      // Morph targets provided as textures via instanced attributes are heavy;
      // here we use base + target in buffers and mix them CPU-side into 'position'.
      void main() {
        vColor = aColor;
        vec3 pos = position * uScale;

        // Subtle breathing/flow
        float n = sin(uTime * 0.7 + pos.x * 1.2) * 0.5 + cos(uTime * 0.45 + pos.y * 1.7) * 0.5;
        pos += normalize(pos + vec3(0.001)) * n * uNoiseAmp;

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = aSize * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragment = /* glsl */`
      precision mediump float;
      varying vec3 vColor;
      uniform float uHueShift;

      // Simple HSV to RGB for color shifts
      vec3 hsv2rgb(vec3 c) {
        vec3 rgb = clamp( abs(mod(c.x*6.0 + vec3(0.0,4.0,2.0), 6.0)-3.0)-1.0, 0.0, 1.0 );
        rgb = rgb*rgb*(3.0-2.0*rgb);
        return c.z * mix(vec3(1.0), rgb, c.y);
      }

      void main() {
        // Soft circular sprite
        vec2 uv = gl_PointCoord * 2.0 - 1.0;
        float r = dot(uv, uv);
        float alpha = smoothstep(1.0, 0.8, r);
        if (alpha <= 0.01) discard;

        // Shift color with hue
        // interpret vColor as base color; convert to HSV-ish simply by modulating hue
        float baseHue = (vColor.r + vColor.g + vColor.b) * 0.15;
        vec3 rgb = hsv2rgb(vec3(mod(baseHue + uHueShift, 1.0), 0.8, 1.0));
        gl_FragColor = vec4(rgb, alpha);
      }
    `;

    const uniforms = {
      uTime: { value: 0 },
      uScale: { value: 1.0 },
      uMorph: { value: 0.0 },
      uNoiseAmp: { value: 0.03 },
      uHueShift: { value: 0.0 },
    };

    const material = new THREE.ShaderMaterial({
      vertexShader: vertex,
      fragmentShader: fragment,
      uniforms,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // ============ Shape templates (generate targetPositions) ============
    function fillTargetFromPoints(list) {
      // Map provided positions into targetPositions, repeating if fewer than COUNT
      const L = list.length;
      for (let i = 0; i < COUNT; i++) {
        const src = list[i % L];
        const ix = i * 3;
        targetPositions[ix + 0] = src[0];
        targetPositions[ix + 1] = src[1];
        targetPositions[ix + 2] = src[2];
      }
    }

    // Heart curve in 3D (flat in Z)
    function makeHeart(n = 4000, scale = 1.4) {
      const pts = [];
      for (let i = 0; i < n; i++) {
        const t = (i / n) * Math.PI * 2;
        const x = scale * 16 * Math.pow(Math.sin(t), 3) / 16;
        const y = scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
        const z = (Math.random() - 0.5) * 0.03; // slight thickness
        pts.push([x * 0.9, y * 0.9, z]);
      }
      return jitter(pts, 0.03);
    }

    // Flower: polar petals (flat in Z)
    function makeFlower(n = 4000, petals = 6, scale = 1.6) {
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = (i / n) * Math.PI * 2;
        const r = 0.7 + 0.3 * Math.sin(petals * a);
        const x = Math.cos(a) * r * scale;
        const y = Math.sin(a) * r * scale;
        const z = (Math.random() - 0.5) * 0.04;
        pts.push([x, y, z]);
      }
      return jitter(pts, 0.04);
    }

    // Saturn: sphere + ring
    function makeSaturn(nSphere = 6000, nRing = 4000, radius = 1.0, ringR = 1.6) {
      const pts = [];
      for (let i = 0; i < nSphere; i++) {
        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.cos(phi) * 0.8; // slightly squashed
        const z = radius * Math.sin(phi) * Math.sin(theta);
        pts.push([x, y, z]);
      }
      for (let i = 0; i < nRing; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = ringR + (Math.random() - 0.5) * 0.15;
        const x = Math.cos(a) * r;
        const z = Math.sin(a) * r;
        const y = (Math.random() - 0.5) * 0.05; // thin ring
        pts.push([x, y, z]);
      }
      return pts;
    }

    // Fireworks: radial burst
    function makeFireworks(bursts = 10, per = 800, radius = 2.0) {
      const pts = [];
      for (let b = 0; b < bursts; b++) {
        const dir = randomUnitVec3();
        for (let i = 0; i < per; i++) {
          const t = i / per;
          const r = radius * t * (0.8 + 0.2 * Math.random());
          const x = dir[0] * r + (Math.random() - 0.5) * 0.04;
          const y = dir[1] * r + (Math.random() - 0.5) * 0.04;
          const z = dir[2] * r + (Math.random() - 0.5) * 0.04;
          pts.push([x, y, z]);
        }
      }
      return pts;
    }

    // Utility: small jitter to avoid perfect edges
    function jitter(pts, amp) {
      return pts.map(([x,y,z]) => [x + (Math.random()-0.5)*amp, y + (Math.random()-0.5)*amp, z + (Math.random()-0.5)*amp]);
    }
    function randomUnitVec3() {
      const z = Math.random() * 2 - 1;
      const t = Math.random() * Math.PI * 2;
      const r = Math.sqrt(1 - z * z);
      return [r * Math.cos(t), r * Math.sin(t), z];
    }

    const TEMPLATES = {
      heart: () => makeHeart(),
      flower: () => makeFlower(),
      saturn: () => makeSaturn(),
      fireworks: () => makeFireworks(),
      sphere: () => makeSaturn(10000, 0, 1.3, 0), // dense sphere
    };

    let currentTemplate = 'sphere';
    function applyTemplate(name) {
      currentTemplate = name;
      const pts = TEMPLATES[name]();
      fillTargetFromPoints(pts);
      // CPU-side morph pre-mix: we’ll interpolate positions towards target per frame
      // by writing blended positions back into the geometry’s 'position' attribute.
      morphProgress = 0.0;
    }

    // Initialize to sphere
    applyTemplate('sphere');

    // ============ Gesture tracking (MediaPipe Hands) ============
    const video = document.getElementById('video');
    let handData = null;
    let pinchActive = false;
    let morphProgress = 0.0;
    let swipeAccumulator = 0;
    let lastWristX = null;
    let hueBase = 0;

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });
    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handData = results.multiHandLandmarks[0];
      } else {
        handData = null;
      }
    });

    async function initCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
      video.srcObject = stream;
      await video.play();
      const cameraMP = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640,
        height: 480
      });
      cameraMP.start();
    }
    initCamera().catch(console.error);

    // ============ Gesture mapping ============
    function getGestureParams() {
      if (!handData) {
        return {
          scale: 1.0,
          hueShift: (hueBase += 0.0005) % 1.0, // slow drift when no hand
          triggerFireworks: false,
          noiseAmp: 0.03,
          morphNext: false
        };
      }
      const idx = handData[8];   // Index fingertip
      const thumb = handData[4]; // Thumb tip
      const wrist = handData[0]; // Wrist
      const middle = handData[12];
      const ring = handData[16];
      const pinky = handData[20];

      // Distances in normalized [0,1] video coords
      function dist(a, b) {
        const dx = a.x - b.x, dy = a.y - b.y;
        return Math.sqrt(dx*dx + dy*dy);
      }

      const pinch = dist(idx, thumb);
      const openness = (dist(idx, wrist) + dist(middle, wrist) + dist(ring, wrist) + dist(pinky, wrist)) / 4;

      // Map gestures:
      // - Pinch controls expansion (smaller pinch -> bigger expansion).
      const scale = THREE.MathUtils.clamp(1.0 + (0.35 - pinch) * 2.4, 0.7, 2.0);

      // - Openness controls hue cycling speed; also gently changes noise amplitude.
      const hueShift = (hueBase += THREE.MathUtils.clamp(openness * 0.01, 0.002, 0.02)) % 1.0;
      const noiseAmp = THREE.MathUtils.lerp(0.01, 0.06, THREE.MathUtils.clamp((openness - 0.15) / 0.5, 0, 1));

      // - Swipe left/right with wrist switches templates.
      let morphNext = false;
      if (lastWristX !== null) {
        const dx = wrist.x - lastWristX;
        swipeAccumulator = dx + swipeAccumulator * 0.85;
        if (Math.abs(swipeAccumulator) > 0.12) {
          morphNext = true;
          swipeAccumulator = 0;
        }
      }
      lastWristX = wrist.x;

      // - Pinch release triggers fireworks burst.
      let triggerFireworks = false;
      if (pinch < 0.06 && !pinchActive) {
        pinchActive = true;
      } else if (pinch > 0.10 && pinchActive) {
        pinchActive = false;
        triggerFireworks = true;
      }

      return { scale, hueShift, noiseAmp, morphNext, triggerFireworks };
    }

    // ============ Template cycle ============
    const templateOrder = ['heart', 'flower', 'saturn', 'sphere'];
    function nextTemplate() {
      const i = templateOrder.indexOf(currentTemplate);
      const j = (i + 1) % templateOrder.length;
      applyTemplate(templateOrder[j]);
    }

    // ============ Animation loop ============
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      uniforms.uTime.value = t;

      const g = getGestureParams();
      uniforms.uScale.value = g.scale;
      uniforms.uHueShift.value = g.hueShift;
      uniforms.uNoiseAmp.value = g.noiseAmp;

      // Trigger template change
      if (g.morphNext) nextTemplate();

      // Trigger fireworks
      if (g.triggerFireworks) {
        applyTemplate('fireworks');
      }

      // Morph CPU-side: write blended positions each frame
      morphProgress = Math.min(morphProgress + 0.02, 1.0);
      const posAttr = geometry.getAttribute('position');
      const p = posAttr.array;
      const bp = basePositions;
      const tp = targetPositions;
      const m = morphProgress;
      for (let i = 0; i < COUNT * 3; i++) {
        p[i] = bp[i] * (1.0 - m) + tp[i] * m;
      }
      posAttr.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    // ============ Resize ============
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    // ============ Optional: mouse orbit for debugging ============
    // Minimal drag-to-rotate
    let isDragging = false, lastX = 0, lastY = 0, rotX = 0, rotY = 0;
    canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      rotY += dx * 0.002;
      rotX += dy * 0.002;
      scene.rotation.set(rotX, rotY, 0);
    });
  </script>
</body>
</html><!DOCTYPE html>
