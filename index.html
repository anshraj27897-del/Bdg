<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Galaxy Particles</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#video{
position:fixed;
bottom:15px;
right:15px;
width:180px;
border-radius:12px;
opacity:0.35;
}

#title{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:20px;
letter-spacing:2px;
}

</style>
</head>

<body>

<div id="title">INTERACTIVE PARTICLE GALAXY</div>

<video id="video" autoplay playsinline></video>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=5

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

const particleCount=30000

const geometry=new THREE.BufferGeometry()

const positions=new Float32Array(particleCount*3)
const colors=new Float32Array(particleCount*3)

for(let i=0;i<particleCount;i++){

const i3=i*3

const radius=Math.random()*6
const spin=radius*1.5

const branch=(i%5)/5*Math.PI*2

positions[i3]=Math.cos(branch+spin)*radius
positions[i3+1]=(Math.random()-0.5)*1.5
positions[i3+2]=Math.sin(branch+spin)*radius

colors[i3]=0.5+Math.random()*0.5
colors[i3+1]=0.3+Math.random()*0.4
colors[i3+2]=1

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

const material=new THREE.PointsMaterial({
size:0.03,
vertexColors:true,
blending:THREE.AdditiveBlending,
transparent:true,
depthWrite:false
})

const particles=new THREE.Points(geometry,material)

scene.add(particles)

let mouseX=0
let mouseY=0

document.addEventListener("mousemove",(event)=>{

mouseX=(event.clientX/window.innerWidth-0.5)*2
mouseY=(event.clientY/window.innerHeight-0.5)*2

})

function animate(){

requestAnimationFrame(animate)

particles.rotation.y+=0.0007
particles.rotation.x+=mouseY*0.002

camera.position.x+= (mouseX*2-camera.position.x)*0.02

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("video").srcObject=stream
})

</script>

</body>
</html>
